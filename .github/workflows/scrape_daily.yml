name: scrape-daily

on:
  schedule:
    - cron: '0 17 * * *'   # ทุกวัน 17:00 UTC = 00:00 ICT
  workflow_dispatch:

concurrency:
  group: taladnudbaan-scrape
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libcurl4-openssl-dev libxml2-dev libssl-dev

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c(
            "rvest", "dplyr", "stringr", "purrr",
            "readr", "httr", "jsonlite", "blastula"
          ))'

      - name: Setup rclone
        uses: AnimMouse/setup-rclone@v1
        with:
          rclone_config: ${{ secrets.RCLONE_CONFIG }}

      - name: Download baseline from Google Drive
        run: rclone copy gdrive:taladnudbaan/taladnudbaan_urls.RData .

      - name: Run daily scrape
        run: Rscript scrape_daily.R

      - name: Upload output files to Google Drive
        if: success()
        run: |
          stamp=$(date +%Y%m%d)
          rclone copy list_${stamp}.csv           gdrive:taladnudbaan/
          rclone copy changelog_${stamp}.csv      gdrive:taladnudbaan/
          rclone copy detail_update_${stamp}.csv  gdrive:taladnudbaan/
          rclone copy taladnudbaan_urls.RData     gdrive:taladnudbaan/
          rclone copy update_status.txt           gdrive:taladnudbaan/

      - name: Notify email
        if: always()
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          JOB_STATUS: ${{ job.status }}
        run: |
          Rscript -e '
          library(blastula)
          user   <- Sys.getenv("GMAIL_USER")
          pass   <- Sys.getenv("GMAIL_APP_PASSWORD")
          status <- Sys.getenv("JOB_STATUS")
          stamp  <- format(Sys.Date(), "%Y%m%d")
          if (!nzchar(user) || !nzchar(pass)) quit(save = "no")
          smtp_send(
            compose_email(body = md(paste0(
              "taladnudbaan daily scrape: **", status, "**\n\n",
              "วันที่: ", Sys.Date()
            ))),
            to          = user,
            from        = user,
            subject     = paste0("[taladnudbaan] daily ", status, " ", stamp),
            credentials = creds_envvar(
              user        = user,
              pass_envvar = "GMAIL_APP_PASSWORD",
              host        = "smtp.gmail.com",
              port        = 465,
              use_ssl     = TRUE
            )
          )'
