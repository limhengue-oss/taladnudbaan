name: scrape-monthly

on:
  schedule:
    - cron: '0 18 1 * *'   # วันที่ 1 ของทุกเดือน 18:00 UTC = 01:00 ICT
  workflow_dispatch:

concurrency:
  group: taladnudbaan-scrape
  cancel-in-progress: false

jobs:
  monthly:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("dplyr", "readr", "stringr", "blastula"))'

      - name: Setup rclone
        uses: AnimMouse/setup-rclone@v1
        with:
          rclone_config: ${{ secrets.RCLONE_CONFIG }}

      - name: Download files from Google Drive
        run: |
          rclone copy gdrive:taladnudbaan/taladnudbaan_properties.csv .
          rclone copy gdrive:taladnudbaan/update_status.txt . || true

      - name: Download changelog + detail_update of last month
        run: |
          prev_month=$(date -d "$(date +%Y-%m-01) -1 day" +%Y%m)
          rclone copy gdrive:taladnudbaan/ . --include "changelog_${prev_month}*.csv"
          rclone copy gdrive:taladnudbaan/ . --include "detail_update_${prev_month}*.csv"

      - name: Run monthly rebuild
        run: Rscript scrape_monthly.R

      - name: Upload output files to Google Drive
        if: success()
        run: |
          rclone copy taladnudbaan_properties.csv    gdrive:taladnudbaan/
          rclone copy taladnudbaan_properties_*.csv  gdrive:taladnudbaan/ || true

      - name: Notify email
        if: always()
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          JOB_STATUS: ${{ job.status }}
        run: |
          Rscript -e '
          library(blastula)
          user   <- Sys.getenv("GMAIL_USER")
          pass   <- Sys.getenv("GMAIL_APP_PASSWORD")
          status <- Sys.getenv("JOB_STATUS")
          if (!nzchar(user) || !nzchar(pass)) quit(save = "no")
          smtp_send(
            compose_email(body = md(paste0(
              "taladnudbaan monthly rebuild: **", status, "**\n\n",
              "วันที่: ", Sys.Date()
            ))),
            to          = user,
            from        = user,
            subject     = paste0("[taladnudbaan] monthly rebuild ", status, " ", format(Sys.Date(), "%Y%m%d")),
            credentials = creds_envvar(
              user        = user,
              pass_envvar = "GMAIL_APP_PASSWORD",
              host        = "smtp.gmail.com",
              port        = 465,
              use_ssl     = TRUE
            )
          )'
