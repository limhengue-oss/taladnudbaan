name: scrape-monthly

on:
  schedule:
    - cron: '0 18 1 * *'   # วันที่ 1 ของทุกเดือน 18:00 UTC = 01:00 ICT วันถัดไป
  workflow_dispatch:

concurrency:
  group: taladnudbaan-scrape
  cancel-in-progress: false

jobs:
  monthly:
    runs-on: ubuntu-latest
    timeout-minutes: 30     # แค่ rebuild ไม่ต้อง scrape -> เร็วมาก

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libcurl4-openssl-dev libxml2-dev libssl-dev

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("dplyr", "readr", "stringr", "googledrive", "base64enc"))'

      - name: Download properties.csv from Drive
        env:
          GDRIVE_TOKEN: ${{ secrets.GDRIVE_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          Rscript - << 'RSCRIPT'
          library(googledrive)
          decoded <- base64enc::base64decode(Sys.getenv("GDRIVE_TOKEN"))
          writeBin(decoded, "gdrive_token.rds")
          drive_auth(token = readRDS("gdrive_token.rds"))
          folder_id <- Sys.getenv("GDRIVE_FOLDER_ID")

          # โหลด properties.csv (ไฟล์ใหญ่ เก็บบน Drive เฉพาะ monthly run)
          hits <- drive_ls(as_id(folder_id), pattern = "^taladnudbaan_properties\\.csv$")
          if (nrow(hits) == 0) stop("ไม่พบ taladnudbaan_properties.csv บน Drive")
          drive_download(hits[1,], path = "taladnudbaan_properties.csv", overwrite = TRUE)
          message("downloaded: taladnudbaan_properties.csv")

          # โหลด update_status.txt (เขียนโดย scrape_daily.R รอบล่าสุด)
          hits2 <- drive_ls(as_id(folder_id), pattern = "^update_status\\.txt$")
          if (nrow(hits2) > 0) {
            drive_download(hits2[1,], path = "update_status.txt", overwrite = TRUE)
            message("downloaded: update_status.txt -> ", readLines("update_status.txt"))
          }
          RSCRIPT

      - name: Run monthly rebuild
        env:
          GDRIVE_TOKEN: ${{ secrets.GDRIVE_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: Rscript scrape_monthly.R

      - name: Cleanup key
        if: always()
        run: rm -f gdrive_token.rds

      - name: Notify email
        if: always()
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          JOB_STATUS: ${{ job.status }}
        run: |
          Rscript - << 'RSCRIPT'
          library(blastula)
          user   <- Sys.getenv("GMAIL_USER")
          pass   <- Sys.getenv("GMAIL_APP_PASSWORD")
          status <- Sys.getenv("JOB_STATUS")
          if (!nzchar(user) || !nzchar(pass)) quit(save = "no")
          smtp_send(
            compose_email(body = md(paste0(
              "taladnudbaan monthly rebuild: **", status, "**\n\n",
              "วันที่: ", Sys.Date()
            ))),
            to          = user,
            from        = user,
            subject     = paste0("[taladnudbaan] monthly rebuild ", status, " ", format(Sys.Date(), "%Y%m%d")),
            credentials = creds_envvar(
              user        = user,
              pass_envvar = "GMAIL_APP_PASSWORD",
              host        = "smtp.gmail.com",
              port        = 465,
              use_ssl     = TRUE
            )
          )
          RSCRIPT
